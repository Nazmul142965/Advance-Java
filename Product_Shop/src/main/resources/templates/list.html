<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f9;
            margin: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border: 1px solid #ddd;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .edit-btn,
        .delete-btn {
            text-decoration: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            margin-right: 8px;
        }
        .edit-btn {
            background-color: #2196F3;
        }
        .edit-btn:hover {
            background-color: #1976D2;
        }
        .delete-btn {
            background-color: #f44336;
        }
        .delete-btn:hover {
            background-color: #d32f2f;
        }
    </style>

</head>
<body>
<h1>Product List</h1>

<a href="/product/add">+ Add Products</a>
<br><br>
<p th:if="${products.isEmpty()}">No products available</p>
<table th:unless="${products.isEmpty()}">
    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Action</th>
    </tr>

    <tr th:each="product : ${products}">
        <td th:text="${product.id}">1</td>
        <td th:text="${product.name}">Shirt</td>
        <td th:text="${product.category}">Men</td>
        <td th:text="${product.price}">999.0</td>
        <td th:text="${product.stock}">50</td>
        <td>
            <a th:href="@{'/product/edit/'+ ${product.id}}" class="edit-btn">Edit</a>
            <a href="#" class="delete-btn">Delete</a>
        </td>
    </tr>
</table>
</body>
</html>
